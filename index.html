<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Linktree Custom</title>
  <link rel="stylesheet" href="resources/style/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css">
</head>

<body class="dark-theme">

  <div class="container">
    <button id="theme-toggle" class="theme-toggle"><i class="fas fa-moon"></i></button>
    <img id="profile" src="" alt="Profile" onerror="this.style.display='none'">
    <h1 id="name"></h1>
    <span id="description"></span>
    <div id="redes" class="links"></div>


    <div class="items-container folders-container">
      <div id="items" class="items"></div>
    </div>


      <div class="items-container folders-container">
        <div id="pastas" class="folders"></div>
      </div>
    </div>


</body>

<footer>
  <script src="./resources/script/utils.js"></script>
  <script src="./resources/script/main.js"></script>
</footer>

</html>
